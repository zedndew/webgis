<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet-search.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        /* Style untuk Tajuk */
        .map-title {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border-radius: 5px;
            z-index: 1000;
            text-align: center;
            /* Tambahan untuk susunan logo & teks */
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .map-title h2 {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #333;
            font-size: 20px;
            letter-spacing: 1px;
        }
        /* Style saiz logo */
        .map-logo {
            height: 50px; /* Anda boleh laras ketinggian ini */
            width: auto;
        }
        </style>
        <title>POLITEKNIK UNGKU OMAR - Peta Lot</title>
    </head>
    <body>
        <div class="map-title">
            <img src="Logo_POU.png" alt="Logo POU" class="map-logo">
            <h2>POLITEKNIK UNGKU OMAR</h2>
        </div>

        <div id="map"></div>
        
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet-search.js"></script>
        
        <script src="data/LOTGABUNGREAL_0.js"></script>
        <script src="data/TANDASEMPADANLOTGABUNG_1.js"></script>

        <script>
        var map = L.map('map', {
            zoomControl:true, maxZoom:28, minZoom:1
        }).fitBounds([[2.1028141476647866,102.52081473553314],[2.1046472704478267,102.52385450525954]]);

        // Base Layers
        var googleSat = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            opacity: 1.0,
            attribution: '© Google Satellite',
            maxZoom: 28
        }).addTo(map);

        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 28,
            attribution: '© OpenStreetMap'
        });

        // Polygon Style (Lot)
        function style_LOTGABUNGREAL_0_0() {
            return {
                pane: 'pane_LOTGABUNGREAL_0',
                opacity: 1,
                color: 'rgba(255,255,0,1.0)', // Kuning
                weight: 2.0, 
                fill: true,
                fillOpacity: 0.2,
                fillColor: 'rgba(255,255,0,1.0)',
                interactive: true,
            }
        }
        
        map.createPane('pane_LOTGABUNGREAL_0');
        map.getPane('pane_LOTGABUNGREAL_0').style.zIndex = 400;

        var layer_LOTGABUNGREAL_0 = new L.geoJson(json_LOTGABUNGREAL_0, {
            pane: 'pane_LOTGABUNGREAL_0',
            style: style_LOTGABUNGREAL_0_0,
            onEachFeature: function(feature, layer) {
                var popupContent = 'Lot: ' + (feature.properties['NO_LOT'] || 'N/A');
                layer.bindPopup(popupContent);
            }
        });
        map.addLayer(layer_LOTGABUNGREAL_0);

        // Point Style (Sempadan)
        function style_TANDASEMPADANLOTGABUNG_1_0() {
            return {
                pane: 'pane_TANDASEMPADANLOTGABUNG_1',
                radius: 4.0,
                fillColor: 'rgba(255,0,0,1.0)', // Merah
                color: '#000',
                weight: 1,
                fillOpacity: 1,
                interactive: true,
            }
        }
        
        map.createPane('pane_TANDASEMPADANLOTGABUNG_1');
        map.getPane('pane_TANDASEMPADANLOTGABUNG_1').style.zIndex = 401;

        var layer_TANDASEMPADANLOTGABUNG_1 = new L.geoJson(json_TANDASEMPADANLOTGABUNG_1, {
            pane: 'pane_TANDASEMPADANLOTGABUNG_1',
            pointToLayer: function (feature, latlng) {
                return L.circleMarker(latlng, style_TANDASEMPADANLOTGABUNG_1_0());
            },
        });
        map.addLayer(layer_TANDASEMPADANLOTGABUNG_1);

        // Layer Control
        var baseMaps = { "Satelit": googleSat, "OSM": osm };
        var overlayMaps = { "Lot Tanah": layer_LOTGABUNGREAL_0, "Sempadan": layer_TANDASEMPADANLOTGABUNG_1 };
        L.control.layers(baseMaps, overlayMaps).addTo(map);

        // Search
        map.addControl(new L.Control.Search({
            layer: layer_LOTGABUNGREAL_0,
            propertyName: 'NO_LOT',
            initial: false,
            hideMarkerOnCollapse: true
        }));
        </script>
    </body>
</html>
